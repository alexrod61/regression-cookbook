<style>
  #cookie-popup {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 340px;
    max-width: calc(100vw - 40px);
    background-color: #ffffff;
    padding: 24px 26px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.14);
    border: 1px solid #f8c471;
    z-index: 9999;
    font-family: inherit;
    display: none;
  }

  #cookie-popup h4 {
    margin: 0 0 10px 0;
    font-size: 1.05rem;
    line-height: 1.3;
    font-weight: 700;
    color: #f35c24;
  }

  #cookie-popup p {
    margin: 0 0 20px 0;
    font-size: 0.9rem;
    line-height: 1.55;
    color: #808080;
  }

  #cookie-popup a {
    color: rgb(214, 122, 127);
    text-decoration: underline;
    text-underline-offset: 2px;
    font-weight: 600;
  }

  #cookie-popup a:hover {
    color: #f35c24;
  }

  .popup-button-container {
    display: flex;
    gap: 10px;
  }

  .btn-accept,
  .btn-decline {
    flex: 1;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
    font-family: inherit;
    font-size: 0.9rem;
    transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }

  .btn-accept {
    background-color: #f35c24;
    color: #ffffff;
    border: 1px solid #f35c24;
  }

  .btn-decline {
    background-color: #FCF3CF;
    color: #0b4b91;
    border: 1px solid #f8c471;
  }

  .btn-accept:hover {
    background-color: #d94d18;
    border-color: #d94d18;
  }

  .btn-decline:hover {
    background-color: #f8c471;
    color: #0b4b91;
  }

  @media (max-width: 600px) {
    #cookie-popup {
      left: 20px;
      right: 20px;
      bottom: 20px;
      width: auto;
    }

    .popup-button-container {
      flex-direction: column;
    }
  }
</style>

<div id="cookie-popup" role="dialog" aria-live="polite" aria-label="Cookie consent notice">
  <h4>We value your privacy.</h4>

  <p>
    Do you consent to the use of cookies to analyze website traffic?
    No personally identifying information is stored.
    See our <a href="/regression-cookbook/book/privacy-policy.html">privacy policy here</a>.
  </p>

  <div class="popup-button-container">
    <button class="btn-accept" onclick="acceptCookies()">Accept</button>
    <button class="btn-decline" onclick="declineCookies()">Decline</button>
  </div>
</div>

<script>
  window.addEventListener('load', function() {
    const consent = localStorage.getItem('cookieConsent');

    if (!consent) {
      document.getElementById('cookie-popup').style.display = 'block';
    } else if (consent === 'granted') {
      activateAnalytics();
    }
  });

  function acceptCookies() {
    localStorage.setItem('cookieConsent', 'granted');
    activateAnalytics();
    closePopup();
  }

  function declineCookies() {
    localStorage.setItem('cookieConsent', 'denied');
    closePopup();
  }

  function closePopup() {
    document.getElementById('cookie-popup').style.display = 'none';
  }

  function activateAnalytics() {
    if (typeof gtag === 'function') {
      gtag('consent', 'update', {
        'analytics_storage': 'granted'
      });
    }
  }
</script>
